apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: gatedemo
spec:
  components:
  - name: gatedemo-identity
    type: auth0-idp
    properties:
      kvSecretPrefix: auth0
      seedAdminUser: true
      seedEmail: admin@cafe.io
  - name: gatedemo-platform
    type: realtime-platform
    properties:
      iot: true
      dataRetention: 7d
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      environment:
        LOG_LEVEL: info
        PIPELINE_NAME: gatedemo
      topics:
      - name: gatedemo.validated-readings
        partitions: 3
        retention: 604800000
      - name: gatedemo.sensor-aggregates
        partitions: 3
        retention: 604800000
      processors:
      - name: rolling-average
        sql: "SELECT\n  sensor_id,\n  AVG(reading) AS rolling_average\nFROM readings_window\n\
          GROUP BY sensor_id\n"
  - name: gatedemo-ingest
    type: realtime-service
    properties:
      port: 8080
      healthPath: /health
      websocket: false
      role: ingest
      bootstrap: true
      realtime: gatedemo-platform
      consumes: []
      produces:
      - gatedemo.validated-readings
      identity: gatedemo-identity
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      environment:
        SERVICE_NAME: gatedemo-ingest
        PIPELINE_NAME: gatedemo
        INGEST_PROTOCOL: http
        VALIDATION_MODE: strict
    traits:
    - type: pure-ingress
      properties:
        domain: gatedemo-ingest.example.com
        path: /
        identity: gatedemo-identity
    - type: expose-api
      properties:
        identity: gatedemo-identity
        apiType: websocket
  - name: gatedemo-processor
    type: realtime-service
    properties:
      port: 8080
      healthPath: /health
      websocket: false
      role: processor
      bootstrap: true
      realtime: gatedemo-platform
      consumes:
      - gatedemo.validated-readings
      produces:
      - gatedemo.sensor-aggregates
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      environment:
        SERVICE_NAME: gatedemo-processor
        PIPELINE_NAME: gatedemo
        AGGREGATION_MODE: rolling-average
        WINDOW_KIND: per-sensor
  - name: gatedemo-gateway
    type: realtime-service
    properties:
      port: 8080
      healthPath: /health
      websocket: true
      role: gateway
      bootstrap: true
      realtime: gatedemo-platform
      consumes:
      - gatedemo.sensor-aggregates
      produces: []
      identity: gatedemo-identity
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      environment:
        SERVICE_NAME: gatedemo-gateway
        PIPELINE_NAME: gatedemo
        STREAM_PROTOCOL: websocket
        WS_PATH: /ws
    traits:
    - type: pure-ingress
      properties:
        domain: gatedemo-gateway.example.com
        path: /ws
        identity: gatedemo-identity
    - type: expose-api
      properties:
        identity: gatedemo-identity
        apiType: websocket
