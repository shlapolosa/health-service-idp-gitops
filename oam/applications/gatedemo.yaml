apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: gatedemo
spec:
  components:
  - name: gatedemo-identity
    type: auth0-idp
    properties:
      kvSecretPrefix: auth0
      seedAdminUser: true
      seedEmail: admin@gatedemo.local
      seedConnection: Username-Password-Authentication
  - name: gatedemo-platform
    type: realtime-platform
    properties:
      image: ghcr.io/example/gatedemo-platform:latest
      port: 8080
      healthPath: /health
      iot: true
      database: mongodb
      visualization: grafana
      dataRetention: 7d
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 250m
          memory: 256Mi
      environment:
        LOG_LEVEL: info
        PIPELINE_NAME: gatedemo
      topics:
      - name: gatedemo.validated.readings
        partitions: 3
        retention: 604800000
      - name: gatedemo.sensor.aggregates
        partitions: 3
        retention: 604800000
      processors:
      - name: rolling-average
        sql: "SELECT\n  sensor_id,\n  AVG(reading) AS rolling_avg\nFROM readings\n\
          GROUP BY sensor_id\n"
  - name: gatedemo-ingest
    type: realtime-service
    properties:
      image: ghcr.io/example/gatedemo-ingest:latest
      port: 8080
      healthPath: /health
      websocket: false
      role: ingest
      bootstrap: true
      realtime: kafka
      identity: gatedemo-identity
      produces:
      - gatedemo.validated.readings
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      environment:
        PIPELINE_NAME: gatedemo
        VALIDATION_MODE: strict
        INGEST_PROTOCOL: http
    traits:
    - type: pure-ingress
      properties:
        domain: gatedemo.example.com
        http:
          /ingest: 8080
        identity: gatedemo-identity
    - type: expose-api
      properties:
        identity: gatedemo-identity
        apiType: websocket
  - name: gatedemo-processor
    type: realtime-service
    properties:
      image: ghcr.io/example/gatedemo-processor:latest
      port: 8080
      healthPath: /health
      websocket: false
      role: processor
      bootstrap: true
      realtime: kafka
      consumes:
      - gatedemo.validated.readings
      produces:
      - gatedemo.sensor.aggregates
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      environment:
        PIPELINE_NAME: gatedemo
        AGGREGATION_WINDOW: rolling
        AGGREGATION_METRIC: average
  - name: gatedemo-gateway
    type: realtime-service
    properties:
      image: ghcr.io/example/gatedemo-gateway:latest
      port: 8080
      healthPath: /health
      websocket: true
      role: gateway
      bootstrap: true
      realtime: kafka
      identity: gatedemo-identity
      consumes:
      - gatedemo.sensor.aggregates
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      environment:
        PIPELINE_NAME: gatedemo
        STREAM_PATH: /ws
    traits:
    - type: pure-ingress
      properties:
        domain: gatedemo.example.com
        http:
          /ws: 8080
        identity: gatedemo-identity
    - type: expose-api
      properties:
        identity: gatedemo-identity
        apiType: websocket
