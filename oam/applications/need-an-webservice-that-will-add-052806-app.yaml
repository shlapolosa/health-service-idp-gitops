apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: need-an-webservice-that-will-add-052806-app
  namespace: default
spec:
  components:
    - name: need-an-webservice-that-will-add-052806-api
      type: webservice
      properties:
        name: need-an-webservice-that-will-add-052806-api
        language: nodejs
        framework: express
        port: 8080
        healthPath: /health
        resources:
          cpu: 250m
          memory: 256Mi
        environment:
          DB_HOST: need-an-webservice-that-will-add-052806-db
          DB_PORT: "5432"
          DB_NAME: additions
          DB_USER: appuser
          DB_PASSWORD: changeme
          CACHE_URL: redis://:redis-password@need-an-webservice-that-will-add-052806-cache-master:6379
    - name: need-an-webservice-that-will-add-052806-cache
      type: redis
      properties:
        architecture: standalone
        authEnabled: true
        password: redis-password
        persistenceEnabled: false
        metricsEnabled: true
    - name: need-an-webservice-that-will-add-052806-db
      type: postgresql
      properties:
        database: additions
        auth:
          username: appuser
          password: changeme
          postgresPassword: adminpass
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        metrics: true
        storage: 10Gi
        username: appuser
        password: changeme
        postgresPassword: adminpass
