apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: need-an-webservice-that-will-add-052806-app
  namespace: default
spec:
  components:
    - name: need-an-webservice-that-will-add-052806-api
      type: webservice
      properties:
        name: need-an-webservice-that-will-add-052806-api
        language: nodejs
        framework: express
        port: 8080
        healthPath: /health
        resources:
          cpu: 250m
          memory: 256Mi
        environment:
          NODE_ENV: production
        database: need-an-webservice-that-will-add-052806-db
        cache: need-an-webservice-that-will-add-052806-cache
    - name: need-an-webservice-that-will-add-052806-db
      type: postgresql
      properties:
        database: additions
        auth:
          username: appuser
          password: changeme
          postgresPassword: adminpass
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        storage: 10Gi
        metrics: true
    - name: need-an-webservice-that-will-add-052806-cache
      type: redis
      properties:
        architecture: standalone
        persistenceEnabled: true
        storageSize: 8Gi
        metricsEnabled: true
