apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: dynamic-number-addition-system-need-a-080812-app
  namespace: default
spec:
  components:
    - name: dynamic-number-addition-system-need-a-080812-backend
      type: webservice
      properties:
        name: dynamic-number-addition-system-need-a-080812-backend
        language: python
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        environment:
          LOG_LEVEL: info
        port: 8080
        healthPath: /health
        database: dynamic-number-addition-system-need-a-080812-postgresql
        cache: dynamic-number-addition-system-need-a-080812-redis
    - name: dynamic-number-addition-system-need-a-080812-postgresql
      type: postgresql
      properties:
        database: additiondb
        auth:
          username: appuser
          password: changeme
          postgresPassword: adminpass
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        storage: 10Gi
    - name: dynamic-number-addition-system-need-a-080812-redis
      type: redis
      properties:
        architecture: standalone
        authEnabled: true
        persistenceEnabled: false
        replicaCount: 1
        metricsEnabled: true
