apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: realtime-wearables-data-stream-that-makes-125959-app
  namespace: default
spec:
  components:
    # Fix 2026-05-29 — was image: nginx:stable / node:20-alpine / python:3.11-slim
    # Pods CrashLoopBackOff because upstream runtime images have no app code.
    # Org `default/webservice` CD supports language: which triggers the
    # microservice-standard-contract Argo workflow to scaffold + build + push the
    # real app image. Dropping image, setting language so the platform takes over.
    - name: realtime-wearables-data-stream-that-makes-125959-web-client
      type: webservice
      properties:
        language: nodejs
        framework: nextjs
        port: 8080
    - name: realtime-wearables-data-stream-that-makes-125959-mobile-client
      type: webservice
      properties:
        language: nodejs
        framework: react-native
        port: 8080
    - name: realtime-wearables-data-stream-that-makes-125959-bff
      type: webservice
      properties:
        language: nodejs
        framework: express
        port: 8080
    - name: realtime-wearables-data-stream-that-makes-125959-api
      type: webservice
      properties:
        language: python
        framework: fastapi
        port: 8080
    - name: realtime-wearables-data-stream-that-makes-125959-stream-processor
      type: realtime-platform
      properties: {}
    - name: realtime-wearables-data-stream-that-makes-125959-data-store
      type: postgresql
      properties:
        database: wearables_data
    - name: realtime-wearables-data-stream-that-makes-125959-streaming-processor
      type: kafka
      properties: {}
    - name: realtime-wearables-data-stream-that-makes-125959-timeseries-db
      type: clickhouse
      properties: {}
    - name: realtime-wearables-data-stream-that-makes-125959-user-profile-db
      type: postgresql
      properties:
        database: user_profiles
    - name: shared-mongodb
      type: mongodb
      properties: {}
    - name: shared-redis
      type: redis
      properties: {}
    - name: realtime-wearables-data-stream-that-makes-125959-graphql
      type: graphql-gateway
      properties: {}
