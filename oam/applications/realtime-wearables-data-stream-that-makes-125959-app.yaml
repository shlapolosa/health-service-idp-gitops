apiVersion: core.oam.dev/v1beta1
kind: Application
metadata:
  name: realtime-wearables-data-stream-that-makes-125959-app
  namespace: default
spec:
  components:
    # Fix 2026-05-29 (second iteration).
    # Two failure classes addressed:
    # 1. Component names exceeded the 63-char DNS label limit after CDs added their
    #    own suffixes (e.g. graphql-gateway adds "-infrastructure"; postgresql adds
    #    "-postgresql"; realtime-platform adds "-realtime-service"). Renamed all
    #    components to use the short prefix `wear-125959-` (12 chars) so suffixes fit.
    # 2. webservice CD requires `image:` (CUE schema enforced). Restoring image
    #    pointing at the scaffold target (docker.io/socrates12345/<name>:latest)
    #    where microservice-standard-contract workflow will push real app code.
    - name: wear-125959-web-client
      type: webservice
      properties:
        image: docker.io/socrates12345/wear-125959-web-client:latest
        language: nodejs
        framework: nextjs
        port: 8080
    - name: wear-125959-mobile-client
      type: webservice
      properties:
        image: docker.io/socrates12345/wear-125959-mobile-client:latest
        language: nodejs
        framework: react-native
        port: 8080
    - name: wear-125959-bff
      type: webservice
      properties:
        image: docker.io/socrates12345/wear-125959-bff:latest
        language: nodejs
        framework: express
        port: 8080
    - name: wear-125959-api
      type: webservice
      properties:
        image: docker.io/socrates12345/wear-125959-api:latest
        language: python
        framework: fastapi
        port: 8080
    - name: wear-125959-stream-processor
      type: realtime-platform
      properties: {}
    - name: wear-125959-data-store
      type: postgresql
      properties:
        database: wearables_data
    - name: wear-125959-stream-kafka
      type: kafka
      properties: {}
    - name: wear-125959-tsdb
      type: clickhouse
      properties: {}
    - name: wear-125959-user-db
      type: postgresql
      properties:
        database: user_profiles
    - name: shared-mongodb
      type: mongodb
      properties: {}
    - name: shared-redis
      type: redis
      properties: {}
    - name: wear-125959-graphql
      type: graphql-gateway
      properties: {}
